<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Landing Page</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/logo.png" type="image/png">
</head>

<body>
    <main class="hero"> 
        <div class="left-bg"></div>
        <div class="right-bg"></div>

        <div class="container">
            <div class="flex">
                <img class="logo" src="images/logo.png" alt="Pokemon Logo">

                <i class="ri-menu-3-line menu"></i>
            </div>

            <div class="flex">
                <div class="left">
                    <div class="content">
                        <h4 class="small-heading">
                            POKEMON GEN I
                        </h4>

                        <h1 class="title">
                            Pikachu
                        </h1>

                        <p class="description">
                            Pikachu is an Electric-type Pokémon introduced in Generation I.
                            Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
                            They are almost completely covered by yellow fur.
                        </p>

                        <div class="pagination">
                            <div class="line"></div>
                            <span class="page-number">
                                01 / 08
                            </span>
                        </div>

                    </div>
                    <i class="pokeball ri-football-line"></i>
                </div>

                <div class="right">
                    <div class="dots">
                        <div class="dot active"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>

            <img class="pikachu" src="images/pikachu.png" alt="Pikachu">
        </div>
    </main>
</body>

</html>
