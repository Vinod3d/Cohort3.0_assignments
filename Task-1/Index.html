<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Landing Page</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <nav>
            <div class="logo">
                <img src="images/logo.png" alt="Pokemon Logo">
            </div>
            <div class="menu"><i class="ri-menu-line"></i></div>
        </nav>
        <div class="main-content">
            <div class="left">
                <div class="content">
                    <h5 class="sub-title">POKEMON GEN I</h5>
                    <h1 class="title">Pikachu</h1>
                    <p class="description">
                        Pikachu is an Electric-type Pokémon introduced
                        in Generation I. Pikachu are small, chubby,
                        and incredibly cute mouse-like Pokémon.
                        They are almost completely covered by
                        yellow fur.
                    </p>

                    <div class="pagination">
                        <div class="line"></div>
                        <span class="page-number">01 / 08</span>
                    </div>

                </div>

                <div class="pokeball"></div>

            </div>

            <div class="right">

                <!-- Dummy Character Image Path -->
                <img src="images/pikachu.png" alt="Pikachu" class="character">

                <div class="dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>



    </div>

</body>

</html>
